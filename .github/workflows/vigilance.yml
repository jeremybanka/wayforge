name: Vigilance

on:
  schedule:
    - cron: "17 9 * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  SecurityRelease:
    name: Security Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CHANGESETS_APP_CLIENT_ID }}
          private-key: ${{ secrets.CHANGESETS_APP_PRIVATE_KEY }}
          owner: jeremybanka
          repositories: wayforge
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
      - uses: ./.github/actions/setup
      - run: pnpm vigilance
      - name: Publish Vigilance PR
        env:
          BRANCH_NAME: vigilance-bot-never-sleeps
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$(git status --porcelain -- .changeset)" ]; then
            echo "No security release changesets were generated."
            exit 0
          fi

          git config user.email "vigilance-bot@users.noreply.github.com"
          git config user.name "vigilance-bot"
          git switch -C "${BRANCH_NAME}"
          git add .changeset
          git commit -m "Add security release changesets"
          git push --force origin "HEAD:${BRANCH_NAME}"

          cat > /tmp/vigilance-pr-body.md <<'BODY'
          This automated PR releases packages whose latest npm-published versions still install high or critical production dependency vulnerabilities that are no longer present in the current workspace graph.

          The generated changesets list the affected advisories and the dependency versions that were expunged.
          BODY

          if gh pr view "${BRANCH_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr edit "${BRANCH_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Release patched dependency graphs" \
              --body-file /tmp/vigilance-pr-body.md
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${BRANCH_NAME}" \
              --title "Release patched dependency graphs" \
              --body-file /tmp/vigilance-pr-body.md
          fi
