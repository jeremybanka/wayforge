blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@typescript/*"
autoInstallPeers: false

packages:
  - "apps/*"
  - "packages/*"
  - "templates/*"

allowBuilds:
  '@biomejs/biome': set this to true or false
  "@parcel/watcher": true
  "@swc/core": true
  "@vercel/speed-insights": true
  "bun": true
  dprint: true
  "esbuild": true
  "rolldown": true
  "sharp": true
  "unrs-resolver": true
  "workerd": true
